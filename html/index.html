<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/images/ChatGPT Image 5 de nov. de 2025, 22_56_21 (1).png">
  <title>AtomAI — Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Scoped overrides so the login scene fills the viewport */
    body { display: block; overflow: hidden; }
  </style>
</head>
<body>

<div class="login-scene">
  <!-- Particle network canvas -->
  <canvas id="particles-canvas"></canvas>

  <!-- Login card -->
  <div class="login-card">

    <div class="login-logo-area">
      <img src="/images/ChatGPT Image 5 de nov. de 2025, 22_56_21 (1).png" alt="Logo AtomAI">
      <span class="brand-name">AtomAI</span>
    </div>

    <h1>Bem-vindo de volta</h1>
    <p class="welcome-sub">Acesse sua conta para continuar</p>

    <!-- Error message -->
    <div class="error-banner" id="error-banner">Email ou senha incorretos.</div>

    <!-- Email -->
    <div class="field-group">
      <label for="email">Email</label>
      <div class="input-wrapper">
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>
    </div>

    <!-- Password -->
    <div class="field-group">
      <label for="password">Senha</label>
      <div class="input-wrapper has-toggle">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="toggle-pass-btn" id="toggle-pass" type="button" title="Mostrar senha">
          <!-- Eye icon -->
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Login button -->
    <button class="login-btn" id="login-btn" type="button">Entrar</button>

    <!-- Credentials hint -->
    <div class="login-hint">
      <strong>Admin:</strong> admin@atomai.com / admin123<br>
      <strong>Usuário:</strong> user@atomai.com / user123
    </div>

  </div>
</div>

<script>
/* ──────────────────────────────────────────────
   PARTICLE NETWORK BACKGROUND
   ────────────────────────────────────────────── */
(function () {
  const canvas  = document.getElementById('particles-canvas');
  const ctx     = canvas.getContext('2d');
  let W, H, particles;
  const COUNT   = 80;
  const MAX_DIST = 130;
  const ACCENT  = '45, 142, 255';

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function Particle() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - .5) * .5;
    this.vy = (Math.random() - .5) * .5;
    this.r  = Math.random() * 1.8 + .6;
    this.alpha = Math.random() * .5 + .3;
  }

  Particle.prototype.update = function () {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > W) this.vx *= -1;
    if (this.y < 0 || this.y > H) this.vy *= -1;
  };

  function init() {
    resize();
    particles = Array.from({ length: COUNT }, () => new Particle());
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Draw lines
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d  = Math.sqrt(dx * dx + dy * dy);
        if (d < MAX_DIST) {
          const opacity = (1 - d / MAX_DIST) * .35;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(${ACCENT}, ${opacity})`;
          ctx.lineWidth = .6;
          ctx.stroke();
        }
      }
    }

    // Draw dots
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${ACCENT}, ${p.alpha})`;
      ctx.fill();
      p.update();
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init();
  draw();
})();

/* ──────────────────────────────────────────────
   LOGIN LOGIC
   ────────────────────────────────────────────── */
const USERS = {
  'admin@atomai.com': { password: 'admin123', role: 'admin' },
  'user@atomai.com':  { password: 'user123',  role: 'user'  }
};

const emailInput    = document.getElementById('email');
const passwordInput = document.getElementById('password');
const loginBtn      = document.getElementById('login-btn');
const errorBanner   = document.getElementById('error-banner');
const togglePass    = document.getElementById('toggle-pass');

/* Toggle password visibility */
togglePass.addEventListener('click', () => {
  const isPass = passwordInput.type === 'password';
  passwordInput.type = isPass ? 'text' : 'password';
  document.getElementById('eye-icon').style.opacity = isPass ? '.45' : '1';
});

/* Enter key support */
[emailInput, passwordInput].forEach(el =>
  el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
);
loginBtn.addEventListener('click', doLogin);

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.add('visible');
  passwordInput.value = '';
  passwordInput.focus();
}

function doLogin() {
  const email    = emailInput.value.trim().toLowerCase();
  const password = passwordInput.value;

  errorBanner.classList.remove('visible');

  if (!email || !password) {
    showError('Por favor, preencha email e senha.');
    return;
  }

  const user = USERS[email];

  if (!user || user.password !== password) {
    showError('Email ou senha incorretos.');
    return;
  }

  /* Store session (demo) */
  sessionStorage.setItem('atomai_user', JSON.stringify({ email, role: user.role }));

  /* Visual feedback before redirect */
  loginBtn.textContent = 'Entrando…';
  loginBtn.disabled = true;

  setTimeout(() => {
    if (user.role === 'admin') {
      window.location.href = '/html/dashboard.html';
    } else {
      window.location.href = '/html/atomai-chat.html';
    }
  }, 600);
}
</script>

</body>
</html>
